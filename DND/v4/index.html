<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex D&D — Dungeons & Dragons 2024</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <a class="header-brand" href="#accueil" aria-label="Codex D&D — Accueil">
        <span class="brand-sigil" aria-hidden="true">⚔</span>
        <div class="brand-text">
          <span class="brand-title">Codex</span>
          <span class="brand-sub">Dungeons &amp; Dragons</span>
        </div>
      </a>

      <button class="nav-toggle" id="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="main-nav">
        <span></span><span></span><span></span>
      </button>

      <nav class="main-nav" id="main-nav" role="navigation" aria-label="Navigation principale">
        <ul class="nav-list" role="list">
          <li><a class="nav-link" href="#accueil" data-page="accueil"><span class="nav-icon" aria-hidden="true">⌂</span><span>Accueil</span></a></li>
          <li><a class="nav-link" href="#races" data-page="races"><span class="nav-icon" aria-hidden="true">❧</span><span>Races</span></a></li>
          <li><a class="nav-link" href="#classes" data-page="classes"><span class="nav-icon" aria-hidden="true">⚔</span><span>Classes</span></a></li>
          <li><a class="nav-link" href="#dons" data-page="dons"><span class="nav-icon" aria-hidden="true">✦</span><span>Dons</span></a></li>
          <li><a class="nav-link" href="#glossaire" data-page="glossaire"><span class="nav-icon" aria-hidden="true">✎</span><span>Glossaire</span></a></li>
          <li><a class="nav-link" href="#sorts" data-page="sorts"><span class="nav-icon" aria-hidden="true">✸</span><span>Sorts</span></a></li>
          <li><a class="nav-link" href="#equipements" data-page="equipements"><span class="nav-icon" aria-hidden="true">⚔</span><span>Équipements</span></a></li>
          <li><a class="nav-link" href="#combat" data-page="combat"><span class="nav-icon" aria-hidden="true">🗡</span><span>Combat</span></a></li>
          <li><a class="nav-link nav-soon" href="#personnage" data-page="personnage" aria-describedby="soon-hint"><span class="nav-icon" aria-hidden="true">♟</span><span>Personnage</span><span class="soon-badge">Bientôt</span></a></li>
        </ul>
      </nav>
    </div>
    <div class="header-ornament" aria-hidden="true"></div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="app" class="main-content" role="main" aria-live="polite" aria-atomic="false">
    <div class="loading-screen" id="loading-screen">
      <div class="loading-sigil" aria-hidden="true">⚔</div>
      <p class="loading-text">Chargement du Codex…</p>
    </div>
  </main>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay hidden" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal" id="modal" tabindex="-1">
      <button class="modal-close" id="modal-close" aria-label="Fermer">✕</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ===== TOOLTIP ===== -->
  <div class="tooltip hidden" id="tooltip" role="tooltip" aria-hidden="true">
    <div class="tooltip-inner" id="tooltip-inner"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
